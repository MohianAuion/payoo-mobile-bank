<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Bankh2</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-800">
    

    <!-- Header section -->

    <section class="max-w-md min-h-screen  bg-gray-200  mx-auto" >

        <header class="mb-20">
            <nav >
                <div class="relative flex justify-center items-center s">
                    <img class="w-52 absolute top-11 " src="assets/bg.png" alt="">
                    <img class="w-16 z-10 absolute top-16" src="assets/Group.png" alt="">
            </nav>
        </header>

        <!-- login section -->

        <section >

        <div class="mt-56 mx-14 min-h-screen">
  <div class="hero-content flex-col lg:flex-row-reverse">
    
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <form class="card-body">
        <fieldset class="fieldset">
          <label class="label">Account Number</label>
          <input value="" id="account-number" type="text" class="input" placeholder="your account number" required />
          <label class="label">Your Pin</label>
          <input id="pin" type="password" class="input" placeholder="6 digit pin number" required />
          <div><a class="link link-hover">Forgot pin?</a></div>
          <button id="login-btn" class="btn btn-neutral mt-4">Login</button>
        </fieldset>
    </form>
    </div>
  </div>
</div>
    </section>

    </section>


    <!-- login section -->

    

    <!-- js linkup -->
     <script src="./js/login.js"></script>
</body>
</html>
